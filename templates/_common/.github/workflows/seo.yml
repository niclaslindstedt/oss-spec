name: seo

# §11.3.10 — structural SEO assertions. Runs `check-seo.mjs` against the
# built site so the discoverability failure modes the spec calls out
# (empty SSR body, missing canonical, JSON-LD drift from og:image,
# orphaned sitemap entries, llms.txt missing, critical-path JS budget
# breach) cannot ship silently. Errors block the PR; warnings surface
# as annotations but do not fail the run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: cd website && npm install && npm run build
      - run: cd website && npm run check:seo
